name: GeoESG CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # ── Rust Setup & Build ──────────────────────────────────
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust-esg-engine/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust-esg-engine/Cargo.lock') }}

    - name: Build & Test Rust ESG Engine
      working-directory: ./rust-esg-engine
      run: |
        cargo test --verbose
        cargo build --release

    # ── Python Setup & Test ─────────────────────────────────
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pytest
      run: pytest test_api.py -v
